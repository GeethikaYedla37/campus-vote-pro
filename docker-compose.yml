services:
  app:
    build: .
    container_name: campus_vote_app
    ports:
      - "8081:10000"
    environment:
      APP_ENV: ${APP_ENV:-local}
      PORT: 10000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:?Set MYSQL_DATABASE in .env}
      DB_USER: ${MYSQL_USER:?Set MYSQL_USER in .env}
      DB_PASS: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      UPLOAD_PATH: /var/www/html/uploads/candidates
      MAIL_TRANSPORT: ${MAIL_TRANSPORT:-smtp}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:?Set MAIL_FROM_ADDRESS in .env}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-CampusVote Pro}
      SMTP_HOST: ${SMTP_HOST:?Set SMTP_HOST in .env}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_ENCRYPTION: ${SMTP_ENCRYPTION:-tls}
    volumes:
      - candidate_uploads:/var/www/html/uploads/candidates
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: campus_vote_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?Set MYSQL_DATABASE in .env}
      MYSQL_USER: ${MYSQL_USER:?Set MYSQL_USER in .env}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:5
    container_name: campus_vote_phpmyadmin
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  candidate_uploads:
